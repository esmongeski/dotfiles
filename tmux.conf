# General
set-option -g mouse on
bind-key \; command-prompt
set -g history-limit 50000
set-window-option -g automatic-rename on
set-option -g set-titles on
set -sg escape-time 0

# Reload config with prefix+r
unbind-key r
bind-key r source-file ~/.tmux.conf

# Clipboard (OSC 52 — copies to local clipboard over SSH)
set -g set-clipboard on

# Vi copy mode
setw -g mode-keys vi
unbind-key [
bind-key i copy-mode
unbind-key n
unbind-key p
unbind-key j
unbind-key k
bind-key j next-window
bind-key k previous-window
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'V' send-keys -X select-line
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection
bind-key -T copy-mode-vi 'J' send-keys -X halfpage-down
bind-key -T copy-mode-vi 'K' send-keys -X halfpage-up
bind-key -T copy-mode-vi ' ' send-keys -X halfpage-down
bind-key -T copy-mode-vi C-space send-keys -X halfpage-up

# Window/tab management
set -g base-index 1
set-option -g renumber-windows on
bind-key C-t new-window
bind-key C-w kill-window
bind-key -n C-Tab next-window
bind-key -n C-S-Tab previous-window
bind-key -n C-Left previous-window
bind-key -n C-Right next-window
bind-key -T root C-1 selectw -t 1
bind-key -T root C-2 selectw -t 2
bind-key -T root C-3 selectw -t 3
bind-key -T root C-4 selectw -t 4
bind-key -T root C-5 selectw -t 5
bind-key -T root C-6 selectw -t 6
bind-key -T root C-7 selectw -t 7
bind-key -T root C-8 selectw -t 8

# Pane splits and navigation
bind-key - split-window -dv -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}"
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# Pane borders
set -g pane-border-style bg=colour235,fg=colour238
set -g pane-active-border-style bg=colour236,fg=colour51

# Status bar
set -g status-interval 2
set -g status-justify left
set -g status-position bottom
set -g status-style bg=colour233,fg=colour245,none
set -g default-terminal "xterm-256color"

set -g status-left ' '
set -g status-left-length 1

set -g status-right '#[fg=colour245] #(TZ="US/Eastern" date +"%%m/%%d/%%y %%H:%%M %%Z") '
set -g status-right-length 50

# Active tab: deep blue bg, white name, light cyan branch
setw -g window-status-current-style bg=colour24,fg=colour231,bold
setw -g window-status-current-format ' #I #[fg=colour255]#W#[fg=colour123] #(git -C "#{pane_current_path}" branch --show-current 2>/dev/null) '

# Inactive tabs: dark gray bg, muted name, dimmer branch
setw -g window-status-style bg=colour236,fg=colour246,none
setw -g window-status-format ' #I #[fg=colour252]#W#[fg=colour243] #(git -C "#{pane_current_path}" branch --show-current 2>/dev/null) '

# Only highlight on bell, not on activity
set -g monitor-activity off
set -g monitor-bell on

# Bell tabs: pink bg, white text
setw -g window-status-bell-style bg=colour161,fg=colour255,bold
